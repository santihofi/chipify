parameters:
  temp: [-40, 27, 100]
  corner_mos: ['tt', 'ss', 'ff', 'sf', 'fs']
  seed: range(1)
  sigma: [1]
  vincm: [0.75]
  vdd: [1.45, 1.5, 1.55]
  ibias: ['8.5u']
  vcm: [0.75]
tests:
  tb_ota_op:
    vdc:
      min: 0.8
      max: 1.1
  tb_ota_gain:
    ac_signals: [out]
    gain:
      min: 1.0
      max: 100.0
    bandwidth:
      min: 100000.0
      max: 1000000000.0
    phase_margin:
      min: 30.0
      max: 90.0
  tb_ota_tran:
    transient_signals: [out]
