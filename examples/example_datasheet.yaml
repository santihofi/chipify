# ─────────────────────────────────────────────────────────────────────────────
# Example Chipify datasheet
#
# A datasheet describes (1) the parameters to sweep and (2) the testbenches to
# run with their pass/fail specs. Chipify expands the sweep into a grid of
# simulation cases, runs them in parallel through Ngspice/Xschem, and reports
# the results and yield.
#
# This file is a documented TEMPLATE: the `tb_*` names below refer to Xschem
# testbench schematics that you provide (see examples/README.md). Copy it into
# your input folder (default `datasheets/`) and adapt it to your design.
# ─────────────────────────────────────────────────────────────────────────────

# Each entry becomes a swept dimension. Values may be:
#   - a list of discrete values:      [-40, 27, 100]
#   - a single value in a list:       [1.5]
#   - a range DSL string:             range(30), linspace(0.6, 0.9, 4), logspace(...)
parameters:
  temp:       [-40, 27, 100]          # corner temperatures (°C)
  corner_mos: ["tt"]                  # process corner label passed to the netlist
  vdd:        [1.5]                   # supply voltage (V)
  vincm:      linspace(0.6, 0.9, 4)   # sweep input common-mode over 4 points
  seed:       range(30)               # 30 Monte-Carlo mismatch seeds

# Each key under `tests` is the path/name of an Xschem testbench schematic.
#
# Scalar measurements (ve, vd, gain, …): each name must match an ngspice vector
# your testbench defines with `let`/`meas` (e.g. `let ve = (v(outp)+v(outn))/2`,
# `meas ac gain max gainmag`). Chipify auto-emits the `echo MY_DATA:` line that
# returns these to the engine — do NOT write that echo yourself in the testbench.
tests:
  tb_ota_op:
    # Measurement boundary specs: min/max define pass/fail, typ is the target.
    # `unit` is optional and display-only — it labels the value in the
    # Measurements table and never affects pass/fail.
    ve:
      min: 0.7
      max: 0.8
      typ: 0.75
      unit: V
    vd:
      min: -0.02
      max: 0.02
      typ: 0.0
      unit: V

  tb_ota_gain:
    # Optional: run this testbench on a specific simulator engine
    # (ngspice | vacask). Omit to use the global default from Settings. This lets
    # one datasheet mix engines — e.g. an AC/Bode bench on vacask, others on ngspice.
    engine: vacask
    # Optional: signals to capture for plotting (transient_signals / dc_signals /
    # ac_signals correspond to the available analysis types).
    ac_signals: [out, outn]
    gain:
      min: 40
      max: 80
      typ: 60
      unit: dB
    bandwidth:                        # YAML supports scientific notation
      min: 1.0e+6
      max: 1.0e+9
      typ: 1.0e+7
      unit: Hz
    # Optional: derive extra metrics from measured values with sandboxed
    # expressions (name: expression).
    measure:
      gbw: "gain * bandwidth"

# ── Custom equations (optional) ───────────────────────────────────────────────
# Derived columns computed from the results, evaluated in a sandbox. They are
# edited by the GUI's CUSTOM EQUATIONS panel and travel with the datasheet.
#
# equations:            # scalar, one value per run (any result column usable)
#   gain_lin: "10 ** (gain / 20)"
#
# transient_equations:  # waveform-level, plottable as extra signals
#   vdiff: "v(outp) - v(outn)"
