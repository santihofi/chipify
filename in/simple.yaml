# datasheet.yaml
parameters:
  temp: [-40, 27, 100]
  corner_mos: ["tt"]
  corner_res: ["res_typ"]
  corner_cap: ["cap_typ"]
  seed: range(1)
  sigma: [1]
  vcm: [0.75]
  vincm: [0.75]
  vdd: [1.5]

tests:
  tb_mult_cell_op:
    ve:
      min: 0.7
      max: 0.8
      typ: 0.75
    vd:
      min: -0.02
      max: 0.02
      typ: 0

  tb_mult_cell_gain:
    gain:
      min: 4
      max: 50
      typ: 10
    bandwidth:
      min: 1.0e+9  # YAML unterstützt wissenschaftliche Notation
      max: 1.0e+11
      typ: 1.0e+10

  tb_cm_feedback_loop:
    phase_margin:
      min: 20
      max: 30
      typ: 60