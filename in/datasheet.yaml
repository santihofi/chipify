  corner_res: ["res_typ_mismatch"]
  corner_cap: ["cap_typ_mismatch"]
  seed: [0, 1, 2, 3, 4, 5]
  sigma: [1]
  vcm: [0.75]
  vincm: [0.75]
  vdd: [1.5]

tests:
