name: Publish to PyPI

# Publishes via PyPI Trusted Publishing (OIDC) — no API tokens.
# Requires this repo + workflow filename to be registered as a (pending)
# publisher on pypi.org, with environment name "pypi".
on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          # Build into a clean dist/ so a stray or accidentally committed artifact
          # from another version can never be published alongside this release.
          rm -rf dist
          python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/chipify
    permissions:
      # Required for OIDC token exchange with PyPI (Trusted Publishing).
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
