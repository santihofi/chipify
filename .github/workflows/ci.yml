name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # PySide6 dlopens libEGL.so.1 / libGL.so.1 when QtWidgets is imported, even
      # under the headless "offscreen" platform. Without these the GUI smoke
      # tests can't import PySide6 and are skipped. (System libs can't be pip
      # dependencies; install.sh installs the same set for local dev.)
      - name: Install Qt system libraries (offscreen GUI tests)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libglib2.0-0 libdbus-1-3 libxkbcommon0 libfontconfig1

      - name: Install package and dev tools
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pytest mypy pandas-stubs types-PyYAML

      - name: Run tests
        run: pytest

      # The Qt GUI smoke tests run headless (offscreen) thanks to the Qt libs
      # installed above; live simulation (Ngspice/Xschem) is not exercised here.
      # mypy covers the strict-typed engine core (see pyproject.toml).
      - name: Type-check (mypy, strict core)
        run: |
          python -m mypy \
            chipify/expression.py \
            chipify/schema.py \
            chipify/util.py \
            chipify/app_config.py \
            chipify/settings.py \
            chipify/data_loader.py \
            chipify/uikit/state.py \
            chipify/uikit/services/plugin_context.py
