# Chipify uses setup.py for packaging metadata and dependencies.
# This file only carries developer-tooling configuration (mypy + pytest).
#
# System dependency (cannot be declared here — pip only installs Python wheels):
# the Qt GUI's xcb platform plugin needs the libxcb-cursor0 system library
# (Qt >= 6.5). `./install.sh` installs it automatically on Debian/Ubuntu; on
# other systems install it via your package manager. Without it, on a Wayland
# session the GUI falls back to native Wayland where dropdown popups don't close.

# ── mypy strict config ────────────────────────────────────────────────────────
[tool.mypy]
strict = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
warn_unused_ignores = true
warn_redundant_casts = true
no_implicit_optional = true
python_version = "3.11"
exclude = ["tests/"]

# Third-party packages without stubs
[[tool.mypy.overrides]]
module = [
    "tqdm.*",
    "jinja2.*",
    "matplotlib.*",
    "scipy.*",
    "asteval.*",
    "numexpr.*",
    "pyopus.*",
]
ignore_missing_imports = true

# GUI and report modules are whitelist-typed gradually
[[tool.mypy.overrides]]
module = [
    "chipify.gui_qt.*",
    # matplotlib-event-handler heavy; typed gradually (pre-existing debt).
    "chipify.uikit.services.scatter_hover",
    "chipify.uikit.services.netlist_export",
    "chipify.pdf_export",
    "chipify.md_export",
    "chipify.export_latex",
    "chipify.debug_export",
    "chipify.run_meta",
    "chipify.project_config",
    "chipify.plugin_loader",
    "chipify.analyzer",
    "chipify.analyses",
    "chipify.plot_manager",
    "chipify.plot_plugins.*",
    "chipify.simulator",
    "chipify.cli",
]
ignore_errors = true

# ── pytest config ─────────────────────────────────────────────────────────────
[tool.pytest.ini_options]
testpaths = ["tests"]
